<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attachment Application Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      padding: 20px;
    }

    .form-container {
      width: 100%;
      max-width: 650px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .form-header {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      padding: 28px 30px;
      text-align: center;
    }

    .form-header h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .form-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    form {
      padding: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1f2937;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.25s ease;
      background: #fff;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .file-box {
      border: 2px dashed #93c5fd;
      background: #eff6ff;
      border-radius: 12px;
      padding: 18px;
      transition: 0.3s ease;
    }

    .file-box:hover {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .file-box input[type="file"] {
      padding: 10px;
      border: none;
      background: transparent;
      width: 100%;
    }

    .note {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 13px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .submit-btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.35);
    }

    .reset-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .reset-btn:hover {
      background: #d1d5db;
      transform: translateY(-2px);
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-header h2 {
        font-size: 22px;
      }

      form {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-header">
      <h2>Application Form</h2>
      <p>Please fill in your details and attach the required document.</p>
    </div>

    <form action="/submit-form" method="POST" enctype="multipart/form-data">
      <div class="form-grid">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
          <label for="position">Apply For</label>
          <select id="position" name="position" required>
            <option value="">-- Select Option --</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
            <option value="admin">Admin</option>
            <option value="intern">Intern</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="message">Message / Cover Letter</label>
          <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
        </div>

        <div class="form-group full-width file-box">
          <label for="attachment">Attach File</label>
          <input type="file" id="attachment" name="attachment" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" required>
          <div class="note">Accepted formats: PDF, DOC, DOCX, JPG, JPEG, PNG</div>
        </div>
      </div>

      <div class="button-row">
        <button type="submit" class="submit-btn">Submit Application</button>
        <button type="reset" class="reset-btn">Clear Form</button>
      </div>
    </form>
  </div>
</body>
</html>
